<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BASeD Asset Gallery — Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; padding: 2rem; }
  h1 { color: #00e5ff; font-size: 1.6rem; margin-bottom: 0.5rem; }
  .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 2.5rem; }
  h2 { color: #ff6ec7; font-size: 1.2rem; margin: 2rem 0 1rem; border-bottom: 1px solid #222; padding-bottom: 0.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
  .card { background: #111118; border: 1px solid #1a1a2e; border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
  .card:hover { border-color: #00e5ff; }
  .card img { width: 100%; height: auto; display: block; cursor: pointer; }
  .card .label { padding: 0.6rem 0.8rem; font-size: 0.75rem; color: #888; word-break: break-all; }
  .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: center; cursor: pointer; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
</style>
</head>
<body>
<h1>🎨 BASeD Asset Gallery — Review</h1>
<p class="subtitle">Only items pending Wesley's review. Everything else already picked.</p>

<h2>📜 Charles — Historian (v3, Early 40s)</h2>
<div class="grid" id="charles"></div>

<h2>🌆 Logo Variants — Synthwave</h2>
<div class="grid" id="logos"></div>

<div class="lightbox" id="lb" onclick="this.classList.remove('active')">
  <img id="lb-img" src="" alt="preview">
</div>

<script>
const sections = {
  charles: { dir: 'assets/charles-v3', files: [
    '001-comic-book-style-portrait-of-a-male-ai-a.png',
    '002-comic-book-style-portrait-of-a-male-ai-a.png',
    '003-comic-book-style-portrait-of-a-male-ai-a.png',
    '004-comic-book-style-portrait-of-a-male-ai-a.png',
    '005-comic-book-style-portrait-of-a-male-ai-a.png',
    '006-comic-book-style-portrait-of-a-male-ai-a.png'
  ]},
  logos: { dir: 'assets/logo-synthwave', files: [
    '001-a-shield-badge-shaped-logo-for-based-bar.png',
    '002-a-shield-badge-shaped-logo-for-based-bar.png',
    '003-a-shield-badge-shaped-logo-for-based-bar.png'
  ]}
};

function openLb(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lb').classList.add('active');
}

Object.entries(sections).forEach(([id, {dir, files}]) => {
  const grid = document.getElementById(id);
  files.forEach((f, i) => {
    const src = dir + '/' + f;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<img src="${src}" alt="${f}" onclick="openLb('${src}')"><div class="label">#${i+1}</div>`;
    grid.appendChild(card);
  });
});
</script>
</body>
</html>
